name: Security Report

on:
  workflow_run:
    workflows: [SAST, Dependency Scanning, Secret Scanning, Container Image Scanning & SBOM]
    types: [completed]
  schedule:
    - cron: '0 8 * * 1'  # Weekly Monday 8am UTC

permissions:
  contents: read
  security-events: read
  issues: write

jobs:
  report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Code Scanning Alerts
        id: alerts
        uses: actions/github-script@v7
        with:
          script: |
            const alerts = await github.rest.codeScanning.listAlertsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const bySeverity = { critical: [], high: [], medium: [], low: [] };
            for (const a of alerts.data) {
              const sev = a.rule?.security_severity_level || a.rule?.severity || 'low';
              (bySeverity[sev] || bySeverity.low).push(a);
            }

            // Split findings by source: container image scans vs other (SAST/deps)
            const containerCategories = ['trivy-backend', 'trivy-frontend'];
            const containerFindings = { critical: [], high: [], medium: [], low: [] };
            const otherFindings     = { critical: [], high: [], medium: [], low: [] };

            for (const a of alerts.data) {
              const sev = a.rule?.security_severity_level || a.rule?.severity || 'low';
              const bucket = containerCategories.some(c => a.tool?.name?.toLowerCase().includes('trivy') || a.most_recent_instance?.location?.path?.includes('trivy'))
                ? containerFindings
                : otherFindings;
              (bucket[sev] || bucket.low).push(a);
              // also keep overall for backward compat
              (bySeverity[sev] || bySeverity.low).push(a);
            }

            const lines = [
              '## 🔒 Weekly Security Report',
              `**Generated**: ${new Date().toISOString().split('T')[0]}`,
              '',
              '### Overall Findings',
              '',
              '| Severity | Count |',
              '|----------|-------|',
              `| 🔴 Critical | ${bySeverity.critical.length} |`,
              `| 🟠 High     | ${bySeverity.high.length} |`,
              `| 🟡 Medium   | ${bySeverity.medium.length} |`,
              `| 🟢 Low      | ${bySeverity.low.length} |`,
              '',
              '### 🐳 Container Image CVEs (Trivy)',
              '',
              '| Severity | Count |',
              '|----------|-------|',
              `| 🔴 Critical | ${containerFindings.critical.length} |`,
              `| 🟠 High     | ${containerFindings.high.length} |`,
              `| 🟡 Medium   | ${containerFindings.medium.length} |`,
              `| 🟢 Low      | ${containerFindings.low.length} |`,
              '',
            ];

            if (bySeverity.critical.length || bySeverity.high.length) {
              lines.push('### ⚠️ Critical / High Findings');
              for (const a of [...bySeverity.critical, ...bySeverity.high]) {
                lines.push(`- [${a.rule?.id}] **${a.rule?.description}** — \`${a.most_recent_instance?.location?.path}\` ([view](${a.html_url}))`);
              }
            } else {
              lines.push('✅ No critical or high severity findings.');
            }

            lines.push('');
            lines.push('> Container image SBOM artifacts are attached to each [release](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/releases) and available as CI workflow artifacts.');
            lines.push('> To request a CVE exception, follow the [exception process](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/blob/main/docs/vulnerability-exception-process.md).');

            const body = lines.join('\n');
            core.setOutput('report', body);
            core.setOutput('has_critical', String(bySeverity.critical.length > 0));
            core.setOutput('has_high', String(bySeverity.high.length > 0));

      - name: Create or Update Security Report Issue
        uses: actions/github-script@v7
        with:
          script: |
            const report = `${{ steps.alerts.outputs.report }}`;
            const label = 'security-report';

            // Ensure label exists
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: 'e11d48',
              });
            } catch {}

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: label,
              state: 'open',
            });

            if (issues.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: report,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🔒 Security Report Dashboard',
                body: report,
                labels: [label],
              });
            }
