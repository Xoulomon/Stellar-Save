name: Mobile E2E Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'mobile/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'mobile/**'

# Cancel in-progress runs on the same branch to save CI minutes
concurrency:
  group: mobile-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── iOS Simulator (macOS 14 Apple Silicon) ──────────────────────────────────
  ios-e2e:
    name: iOS E2E (Maestro)
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Verify Maestro installation
        run: maestro --version

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Boot iOS simulator
        run: |
          # Use iPhone 15 on iOS 17 (adjust device name if needed)
          DEVICE_ID=$(xcrun simctl list devices available | \
            grep -E "iPhone 15 " | grep -v Plus | grep -v Pro | \
            head -1 | grep -oE '[A-F0-9-]{36}')
          if [ -z "$DEVICE_ID" ]; then
            echo "Creating iPhone 15 simulator..."
            DEVICE_ID=$(xcrun simctl create "iPhone 15 E2E" \
              "com.apple.CoreSimulator.SimDeviceType.iPhone-15" \
              "com.apple.CoreSimulator.SimRuntime.iOS-17-0")
          fi
          echo "Booting simulator $DEVICE_ID"
          xcrun simctl boot "$DEVICE_ID" || true
          xcrun simctl list devices | grep Booted
          echo "SIMULATOR_DEVICE_ID=$DEVICE_ID" >> "$GITHUB_ENV"

      - name: Install app on simulator
        # Replace with the actual app path from your build artifact
        # For a real pipeline this step downloads the .app from a build artifact
        run: |
          echo "⚠️  App install step: replace with actual .app download/build step"
          echo "Example: xcrun simctl install booted path/to/StellarSave.app"

      - name: Run smoke suite (iOS)
        run: |
          cd mobile
          maestro test .maestro/smoke.yaml \
            --format junit \
            --output ../test-results/ios-smoke.xml
        env:
          MAESTRO_DRIVER: ios

      - name: Run full E2E suite (iOS) — skipping quarantined tests
        run: |
          cd mobile
          bash scripts/run-tests.sh
        env:
          MAESTRO_DRIVER: ios

      - name: Quarantine report
        if: always()
        run: cd mobile && bash scripts/quarantine-report.sh

      - name: Upload iOS test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-e2e-results
          path: test-results/
          retention-days: 14

      - name: Upload Maestro screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ios-e2e-screenshots
          path: ~/.maestro/tests/
          retention-days: 7

  # ── Android Emulator (Ubuntu) ───────────────────────────────────────────────
  android-e2e:
    name: Android E2E (Maestro)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK command-line tools
        uses: android-actions/setup-android@v3

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Verify Maestro installation
        run: maestro --version

      - name: Enable KVM for Android emulator acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Create and start Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          avd-name: e2e_avd
          script: echo "Emulator started"

      - name: Install APK on emulator
        # Replace with actual APK download step
        run: |
          echo "⚠️  APK install step: replace with actual .apk download/build step"
          echo "Example: adb install path/to/StellarSave.apk"

      - name: Run smoke suite (Android)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          avd-name: e2e_avd
          script: |
            cd mobile
            maestro test .maestro/smoke.yaml \
              --format junit \
              --output ../test-results/android-smoke.xml
        env:
          MAESTRO_DRIVER: android

      - name: Run full E2E suite (Android) — skipping quarantined tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          avd-name: e2e_avd
          script: |
            cd mobile
            bash scripts/run-tests.sh
        env:
          MAESTRO_DRIVER: android

      - name: Quarantine report
        if: always()
        run: cd mobile && bash scripts/quarantine-report.sh

      - name: Upload Android test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-e2e-results
          path: test-results/
          retention-days: 14

      - name: Upload Maestro screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: android-e2e-screenshots
          path: ~/.maestro/tests/
          retention-days: 7

  # ── Quarantine Summary ──────────────────────────────────────────────────────
  quarantine-summary:
    name: Quarantine Report
    runs-on: ubuntu-latest
    needs: [ios-e2e, android-e2e]
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Print quarantine summary
        run: |
          cd mobile
          bash scripts/quarantine-report.sh | tee /tmp/quarantine-summary.txt

      - name: Post summary to job output
        run: |
          echo "## 📱 Mobile E2E Quarantine Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/quarantine-summary.txt >> "$GITHUB_STEP_SUMMARY"
